<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Innovate BioStrategies</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="logo-wrap">
      <img src="logo.png" alt="Innovate BioStrategies logo" class="logo" />
    </a>

    <nav class="nav">
      <a href="profile.html">Profile</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <p class="eyebrow">Contact</p>
      <h1>Schedule an Initial Discussion</h1>
      <p class="hero-text">
        Tell me about your business challenge, opportunity, or project needs,
        and I’ll follow up to discuss whether there’s a fit.
      </p>
    </section>

    <section class="section contact-box">
     
      <h2>Inquiry Form</h2>

      <form
        class="contact-form"
        action="https://formspree.io/f/meedzgpd"
        method="POST"
      >
        <label for="name">* Name</label>
        <input type="text" id="name" name="name" required>

        <label for="title">* Title</label>
        <input type="text" id="title" name="title" required>

        <label for="organization">* Organization</label>
        <input type="text" id="organization" name="organization" required>

        <label for="email">* Email</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone">

        <label for="requirement">* Requirement</label>
        <textarea id="requirement" name="requirement" rows="6" required></textarea>

        <button type="submit" class="button">Submit Inquiry</button>
      </form>
    </section>
  </main>

  <footer>
    <p>© 2026 Innovate BioStrategies</p>
  </footer>

</body>
</html>
